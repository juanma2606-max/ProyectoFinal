<div class="container-fluid p-0 d-flex flex-column" style="height: calc(100vh - 60px);">

  <!-- Header -->
  <div class="bg-dark bg-opacity-75 border-bottom border-success border-opacity-25 px-4 py-3">
    <div class="d-flex align-items-center gap-3">
      <div class="bg-success bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center border border-success border-2" 
           style="width: 50px; height: 50px;">
        <i class="fa-solid fa-seedling text-success fs-4"></i>
      </div>
      <div>
        <h5 class="mb-0 text-light fw-bold">HuertingIA</h5>
        <small class="text-success">
          <i class="fa-solid fa-circle me-1" style="font-size: 0.4rem;"></i>En línea
        </small>
      </div>
    </div>
  </div>

  <!-- Mensajes -->
  <div class="flex-grow-1 overflow-auto p-4" style="background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5));" #mensajesContainer>
    
    <div class="container" style="max-width: 900px;">
      
      <div *ngFor="let mensaje of mensajes" class="mb-4">

        <!-- Mensaje IA -->
        <div *ngIf="mensaje.role === 'assistant'" class="d-flex align-items-start gap-3">
          <div class="bg-success bg-opacity-50 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
               style="width: 36px; height: 36px; min-width: 36px;">
            <i class="fa-solid fa-seedling text-light" style="font-size: 0.85rem;"></i>
          </div>
          <div class="bg-light rounded-3 p-3 shadow-sm" style="max-width: 75%;">
            <p class="mb-0 text-dark" style="white-space: pre-wrap; line-height: 1.6;">{{ mensaje.content }}</p>
          </div>
        </div>

        <!-- Mensaje Usuario -->
        <div *ngIf="mensaje.role === 'user'" class="d-flex justify-content-end">
          <div class="bg-success text-white rounded-3 p-3 shadow" style="max-width: 75%;">
            <p class="mb-0" style="white-space: pre-wrap; line-height: 1.6;">{{ mensaje.content }}</p>
          </div>
        </div>

      </div>

      <!-- Cargando -->
      <div *ngIf="cargando" class="d-flex align-items-start gap-3 mb-4">
        <div class="bg-success bg-opacity-50 rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
             style="width: 36px; height: 36px; min-width: 36px;">
          <i class="fa-solid fa-seedling text-light" style="font-size: 0.85rem;"></i>
        </div>
        <div class="bg-light rounded-3 p-3 shadow-sm">
          <div class="typing-indicator">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div *ngIf="error" class="alert alert-danger d-flex align-items-center" role="alert">
        <i class="fa-solid fa-circle-exclamation me-2"></i>
        {{ error }}
      </div>

    </div>
  </div>

<!-- Input -->
<div class="bg-dark bg-opacity-75 border-top border-success border-opacity-25 p-3 p-md-4">
  <div class="container" style="max-width: 900px;">
    <div class="d-flex gap-2 shadow align-items-end">
      <textarea
        #textareaInput
        class="form-control bg-dark text-light border-success border-opacity-25 flex-grow-1"
        rows="1"
        placeholder="Escribe tu pregunta sobre plantas, huertos, plagas..."
        [(ngModel)]="inputUsuario"
        (input)="ajustarAlturaTextarea()"
        (keydown)="onKeyDown($event)"
        [disabled]="cargando"
        style="resize: none; max-height: 150px; overflow-y: auto;"
      ></textarea>
      <button
        class="btn btn-success px-4"
        (click)="enviarMensaje()"
        [disabled]="cargando || !inputUsuario.trim()"
        style="height: 38px; flex-shrink: 0;"
      >
        <i class="fa-solid fa-paper-plane" *ngIf="!cargando"></i>
        <span class="spinner-border spinner-border-sm" *ngIf="cargando"></span>
      </button>
    </div>
    <small class="text-light opacity-75 mt-2 d-block text-center">
      Pulsa Enter para enviar, Shift+Enter para nueva línea
    </small>
  </div>
</div>

</div>
