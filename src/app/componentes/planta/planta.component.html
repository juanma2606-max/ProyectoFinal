<div class="container-fluid min-vh-100 py-4 plantas-bg">
  <div class="row g-4">

    <!-- COLUMNA IZQUIERDA: Filtros y Lista -->
    <div class="col-12 col-lg-4">
      
      <!-- Título -->
      <div class="text-center mb-4">
        <h3 class="text-light fw-bold">
          <i class="fa-solid fa-leaf text-success me-2"></i>Catálogo de Plantas
        </h3>
        <p class="text-light opacity-75 small mb-0">Explora y aprende sobre cada especie</p>
      </div>

      <!-- Filtros -->
      <div class="card bg-dark bg-opacity-50 border-success border-opacity-25 shadow-sm mb-4">
        <div class="card-body p-3">
          <h6 class="text-light small mb-3 text-uppercase fw-semibold">
            <i class="fa-solid fa-filter me-1"></i>Filtrar por tipo
          </h6>
          <div class="d-flex flex-wrap gap-2">
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === null"
              (click)="seleccionarTipo(null)">
              <i class="fa-solid fa-border-all me-1"></i>Todas
            </button>
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === 'hortaliza'"
              (click)="seleccionarTipo('hortaliza')">
              <i class="fa-solid fa-carrot me-1"></i>Hortalizas
            </button>
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === 'fruta'"
              (click)="seleccionarTipo('fruta')">
              <i class="fa-solid fa-apple-whole me-1"></i>Frutas
            </button>
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === 'hierba'"
              (click)="seleccionarTipo('hierba')">
              <i class="fa-solid fa-spa me-1"></i>Hierbas
            </button>
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === 'flor'"
              (click)="seleccionarTipo('flor')">
              <i class="fa-solid fa-flower me-1"></i>Flores
            </button>
            <button 
              class="btn btn-sm btn-outline-success"
              [class.active]="tipoActivo === 'arbol'"
              (click)="seleccionarTipo('arbol')">
              <i class="fa-solid fa-tree me-1"></i>Árboles
            </button>
          </div>
        </div>
      </div>

      <!-- Lista de plantas -->
      <div class="list-group mb-3 plantas-scroll">
        <a 
          *ngFor="let planta of plantasFiltradas"
          class="list-group-item list-group-item-action bg-dark bg-opacity-75 border-secondary d-flex align-items-center gap-3"
          [routerLink]="[planta.id]"
          routerLinkActive="active">
          
          <img
            [src]="planta.imagen"
            [alt]="planta.nombre"
            class="rounded-circle border border-2 border-success"
            style="width:50px; height:50px; object-fit:cover;"
          />
          <div class="flex-grow-1">
            <h6 class="mb-0 text-light fw-semibold">{{ planta.nombre }}</h6>
            <small class="text-success text-capitalize">
              <i class="fa-solid fa-tag me-1"></i>{{ planta.tipo }}
            </small>
          </div>
          <i class="fa-solid fa-chevron-right text-success"></i>
        </a>

        <!-- Estado vacío -->
        <div *ngIf="plantasFiltradas.length === 0" class="text-center py-5">
          <i class="fa-solid fa-seedling text-success fs-1 mb-3 opacity-50"></i>
          <p class="text-light opacity-75">No hay plantas de este tipo</p>
        </div>
      </div>

      <!-- Botón añadir planta (solo admin) -->
      <div *ngIf="isAdmin" class="d-grid">
        <button class="btn btn-success shadow-sm" routerLink="/app/plantasform">
          <i class="fa-solid fa-plus me-2"></i>Añadir nueva planta
        </button>
      </div>

    </div>

    <!-- COLUMNA DERECHA: Detalle -->
    <div class="col-12 col-lg-8">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
