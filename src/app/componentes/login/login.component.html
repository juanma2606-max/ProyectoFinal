<div class="contenedor container-fluid min-vh-100 d-flex align-items-center justify-content-center">
  <div class="row justify-content-center w-100">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">

      <!-- Imagen -->
      <div class="text-center mb-3">
        <img src="/images/logo.png" class="img-fluid logo">
      </div>

      <!-- Card -->
      <div class="card shadow rounded-4 border-0">
        <div class="card-body p-4 p-md-4 bg-light rounded-4">

          <h5 class="text-center mb-3 text-success fw-bold">
            Iniciar Sesión
          </h5>

          <p class="text-center text-muted mb-4 small">
            Completa los campos para acceder
          </p>

          <form (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label small">Email</label>
              <input
                type="text"
                name="email"
                [(ngModel)]="formLogin.email"
                class="form-control form-control-sm rounded-pill border border-success shadow-sm"
                placeholder="email"
                [disabled]="cargando || cargandoGoogle"
              >
            </div>

            <div class="mb-3">
              <label class="form-label small">Contraseña</label>
              <input
                type="password"
                name="password"
                [(ngModel)]="formLogin.password"
                class="form-control form-control-sm rounded-pill border border-success shadow-sm"
                placeholder="********"
                [disabled]="cargando || cargandoGoogle"
              >
            </div>

            <!-- Error -->
            <div *ngIf="error" class="alert alert-danger py-2 small text-center rounded-pill">
              {{ error }}
            </div>

            <button
              type="submit"
              class="btn btn-success w-100 rounded-pill shadow-sm py-2"
              [disabled]="cargando || cargandoGoogle">
              <span *ngIf="cargando" class="spinner-border spinner-border-sm me-2"></span>
              <span *ngIf="!cargando">Iniciar sesión</span>
              <span *ngIf="cargando">Iniciando sesión...</span>
            </button>
          </form>

          <!-- Separador -->
          <div class="d-flex align-items-center my-3">
            <hr class="flex-grow-1">
            <span class="mx-2 text-muted small">o</span>
            <hr class="flex-grow-1">
          </div>

          <!-- Botón Google -->
          <button
            type="button"
            class="btn btn-outline-secondary w-100 rounded-pill shadow-sm py-2 d-flex align-items-center justify-content-center gap-2"
            (click)="loginWithGoogle()"
            [disabled]="cargando || cargandoGoogle">
            <span *ngIf="cargandoGoogle" class="spinner-border spinner-border-sm"></span>
            <img 
              *ngIf="!cargandoGoogle"
              src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" 
              width="20" 
              height="20"
            >
            <span *ngIf="!cargandoGoogle">Continuar con Google</span>
            <span *ngIf="cargandoGoogle">Conectando...</span>
          </button>

        </div>
      </div>

      <!-- Footer -->
      <p class="text-center text-light mt-3 small">
        ¿No tienes cuenta?
        <a routerLink="/signIn" class="fw-bold text-success text-decoration-none">
          Crear cuenta
        </a>
      </p>

    </div>
  </div>
</div>
