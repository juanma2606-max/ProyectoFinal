<div class="container-fluid py-4">

  <!-- Header -->
  <div class="mb-4">
    <button class="btn btn-outline-light btn-sm mb-3" (click)="volver()">
      <i class="fa-solid fa-arrow-left me-1"></i> Volver al panel
    </button>

    <div class="text-center">
      <div class="avatar-circle bg-success text-white fw-bold mx-auto mb-2"
           style="width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem;">
        {{ (usuario?.username || '?').charAt(0).toUpperCase() }}
      </div>
      <h3 class="text-light fw-bold mb-0">{{ usuario?.username }}</h3>
      <p class="text-light opacity-75">{{ usuario?.email }}</p>
    </div>
  </div>

  <!-- Huertos -->
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">

      <h5 class="text-light fw-semibold mb-3">
        <i class="fa-solid fa-seedling text-success me-2"></i>Huertos
      </h5>

      <ng-container *ngIf="huertos$ | async as huertos; else cargando">

        <div *ngIf="huertos.length === 0"
             class="text-center text-light py-5 bg-dark bg-opacity-25 rounded">
          <i class="fa-solid fa-seedling fs-1 text-success opacity-50 mb-3"></i>
          <p class="mb-0">Este usuario no tiene huertos.</p>
        </div>

        <div *ngFor="let huerto of huertos"
             class="card border-0 shadow-sm mb-3">
          <div class="row g-0 align-items-center">

            <div class="col-3">
              <img
                [src]="huerto.tipo === 'parcela' ? '/images/huerto1.jpg' : '/images/maceta.webp'"
                class="img-fluid rounded-start"
                style="max-height: 100px; width:100%; object-fit:cover;">
            </div>

            <div class="col-9">
              <div class="card-body d-flex justify-content-between align-items-center">
                <div>
                  <h6 class="fw-semibold mb-1">{{ huerto.nombre }}</h6>
                  <span class="badge"
                    [ngClass]="huerto.tipo === 'parcela' ? 'bg-success' : 'bg-warning text-dark'">
                    {{ huerto.tipo | titlecase }}
                  </span>
                  <div class="text-muted small mt-1">
                    {{ huerto.descripcion || 'Sin descripción' }}
                  </div>
                </div>
                <button class="btn btn-sm btn-outline-primary" (click)="verHuerto(huerto.id)">
                  <i class="fa-solid fa-eye me-1"></i> Ver
                </button>
                <button class="btn btn-sm btn-outline-warning" (click)="editarHuerto(huerto.id)">
                  <i class="fa-solid fa-pen"></i>
                </button>
              </div>
            </div>

          </div>
        </div>

      </ng-container>

      <ng-template #cargando>
        <div class="text-center text-light py-5">
          <div class="spinner-border text-success" role="status"></div>
          <p class="mt-2">Cargando huertos...</p>
        </div>
      </ng-template>

    </div>
  </div>
</div>
