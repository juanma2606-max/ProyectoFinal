<div class="container-fluid h-100 py-4">
  <div class="row h-100 g-4">

    <!-- COLUMNA IZQUIERDA: LISTA -->
    <div class="col-12 col-md-4">
      <app-plantas-lista
        (plantaSeleccionada)="onPlantaSeleccionada($event)">
      </app-plantas-lista>
    </div>

    <!-- COLUMNA DERECHA: DETALLE -->
    <div class="col-12 col-md-8">

      <!-- ESTADO VACÍO -->
      <div
        *ngIf="!plantaActiva"
        class="h-100 d-flex flex-column justify-content-center align-items-center text-center"
      >
        <img
          src="assets/images/busca_planta.png"
          class="mb-4"
          style="max-width: 1000px;"
        />
        <p class="text-muted">
          Selecciona una planta para ver su información
        </p>
      </div>

      <!-- CARD DE LA PLANTA -->
      <div *ngIf="plantaActiva" class="card p-4 shadow-sm">

        <img
          [src]="plantaActiva.imagen"
          class="img-fluid rounded mb-3"
          [alt]="plantaActiva.nombre"
        />

        <h5 class="mb-2">
          {{ plantaActiva.nombre }}
        </h5>

        <p>
          {{ plantaActiva.descripcion }}
        </p>

      </div>

    </div>

  </div>
</div>
