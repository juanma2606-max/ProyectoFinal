      <!-- Listado -->
      <div class="list-group">

        <button class="list-group-item list-group-item-action d-flex align-items-center gap-3">
          <span class="text-success fs-5">
            <i class="fas fa-check-square"></i>

            <i class="fas fa-check-square"></i>

          Zanahoria

        <button class="list-group-item list-group-item-action d-flex align-items-center gap-3">
          <span class="text-muted fs-5">

          </span>
          <span class="badge bg-success">4</span>
          <img src="/images/calabaza.png" style="max-width: 50px;">

      </div>

    <!-- COLUMNA DERECHA: DETALLE -->

      <!-- ESTADO VACÍO -->
      <div

      <!-- ESTADO CON CONTENIDO (OCULTO POR AHORA) -->

        <div class="card p-4">
