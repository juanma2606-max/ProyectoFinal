<div *ngIf="planta; else empty">

  <div
    class="card shadow-sm w-100"
    style="max-width:900px;background:rgba(248,250,245,0.95);border-radius:16px">

    <div class="ratio ratio-16x9 bg-light rounded-top">
      <img
        [src]="planta.imagen"
        [alt]="planta.nombre"
        class="img-fluid p-3"
        style="object-fit:contain"
      />
    </div>

    <div class="card-body">
      <h5 class="card-title">{{ planta.nombre }}</h5>
      <p class="card-text" style="white-space:pre-line">
        {{ planta.descripcion }}
      </p>
    </div>

  </div>

</div>

<ng-template #empty>
  <div class="text-muted py-5 text-center">
    Selecciona una planta
  </div>
</ng-template>
