<div class="row g-4">

  <!-- COLUMNA IZQUIERDA: LISTA -->
  <div class="col-12 col-lg-4">

    <!-- FILTRO (MISMO ESTILO QUE PLANTAS) -->
    <div class="btn-group w-100 mb-3 flex-wrap gap-2">

      <button
        type="button"
        class="btn btn-dark btn-outline-success"
        (click)="cambiarTipo('plaga')"
      >
        Plagas
      </button>

      <button
        type="button"
        class="btn btn-dark btn-outline-success"
        (click)="cambiarTipo('enfermedad')"
      >
        Enfermedades
      </button>

    </div>

    <app-plagas-lista
      [plagas]="plagasFiltradas"
      (plagaSeleccionada)="onPlagaSeleccionada($event)">
    </app-plagas-lista>

    <!-- BOTONES AÑADIR -->
    <div class="d-grid gap-2 mt-3">
      <button type="button" class="btn btn-dark btn-outline-success">
        Añadir Plaga
      </button>

      <button type="button" class="btn btn-dark btn-outline-success">
        Añadir Enfermedad
      </button>
    </div>

  </div>

  <!-- COLUMNA DERECHA: DETALLE -->
  <div class="col-12 col-lg-8 d-flex justify-content-center">

    <!-- ESTADO VACÍO -->
    <div *ngIf="!plagaActiva" class="text-muted py-5 text-center">
      Selecciona una {{ tipoActivo }}
    </div>

    <!-- CARD (MISMO PATRÓN QUE PLANTAS) -->
    <div
      *ngIf="plagaActiva"
      class="card shadow-sm mx-auto w-100"
      style="max-width: 900px; background: rgba(248, 250, 245, 0.95); border-radius: 16px;"
    >

      <!-- IMAGEN CONTROLADA (NO SE CORTA) -->
      <div class="ratio ratio-16x9 bg-light rounded-top">
        <img
          [src]="plagaActiva.imagen"
          [alt]="plagaActiva.nombre"
          class="img-fluid p-3"
          style="object-fit: contain;"
        />
      </div>

      <div class="card-body">
        <h5 class="card-title mb-2">{{ plagaActiva.nombre }}</h5>
        <p class="card-text mb-0" style="white-space: pre-line;">{{ plagaActiva.descripcion }}</p>
      </div>

    </div>

  </div>

</div>
