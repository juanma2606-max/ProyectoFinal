<!-- huerto-resume.component.html -->
<div 
  class="card huerto-card h-100 border-0 shadow" 
  (click)="onCardClick()"
  style="cursor: pointer;"
>

  <!-- Imagen -->
  <div class="huerto-img">
    <img
  [src]="huerto?.foto || '/images/huerto1.jpg'"
  [alt]="huerto?.nombre"
  class="img-fluid rounded shadow w-100"
  style="max-height: 280px; object-fit: cover;"
/>
  </div>

  <!-- Título -->
  <div class="huerto-title text-center">
    {{ huerto?.nombre || 'Sin nombre' }}
  </div>

  <!-- Botones de acción -->
  <div class="d-flex justify-content-around align-items-center bg-light py-2 border-top">
    
    <!-- Editar -->
    <button 
      class="btn action-btn edit" 
      type="button"
      (click)="onEdit($event)"
      title="Editar huerto"
    >
      <i class="fa-solid fa-pen"></i>
    </button>

    <!-- Eliminar -->
    <button
      class="btn action-btn delete"
      type="button"
      data-bs-toggle="modal"
      data-bs-target="#exampleModal"
      (click)="onDelete($event)"
      title="Eliminar huerto"
    >
      <i class="fa-solid fa-trash"></i>
    </button>

  </div>

</div>
