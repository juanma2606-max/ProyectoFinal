<link
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  rel="stylesheet"
/>

<div class="d-flex">

  <!-- SIDEBAR -->
  <nav class="sidebar d-flex flex-column flex-shrink-0 position-fixed">

    <button class="toggle-btn">
      <i class="fas fa-chevron-left"></i>
    </button>

    <div class="p-4">
      <h4 class="logo-text fw-bold mb-0">NexusFlow</h4>
      <p class="text-muted small hide-on-collapse">Dashboard</p>
    </div>

    <div class="nav flex-column">

      <a
        routerLink="/home"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
      >
        <i class="fas fa-home me-3"></i>
        <span class="hide-on-collapse">Home</span>
      </a>

      <a
        routerLink="/plantas_lista"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
      >
        <i class="fas fa-leaf me-3"></i>
        <span class="hide-on-collapse">Plantas</span>
      </a>

      <a
        routerLink="/plagas_lista"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
      >
        <i class="fas fa-bug me-3"></i>
        <span class="hide-on-collapse">Plagas</span>
      </a>

      <a
        routerLink="/chat-ia"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
      >
        <i class="fas fa-robot me-3"></i>
        <span class="hide-on-collapse">Chat IA</span>
      </a>

    </div>

    <div class="profile-section mt-auto p-4">
      <div class="d-flex align-items-center">
        <img
          src="https://randomuser.me/api/portraits/women/70.jpg"
          style="height:60px"
          class="rounded-circle"
        />
        <div class="ms-3 profile-info">
          <h6 class="text-white mb-0">Alex Morgan</h6>
          <small class="text-muted">Admin</small>
        </div>
      </div>
    </div>

  </nav>

  <!-- CONTENIDO DINÁMICO -->
  <main class="main-content flex-grow-1 ms-auto p-4">
    <router-outlet></router-outlet>
  </main>

</div>
