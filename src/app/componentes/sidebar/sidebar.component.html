<link
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  rel="stylesheet"
/>

<div class="layout">

  <!-- BOTÓN HAMBURGUESA (SOLO MÓVIL) -->
  <button
    class="btn btn-success d-md-none position-fixed"
    style="top: 15px; left: 15px; z-index: 1100;"
    (click)="sidebarOpen = !sidebarOpen"
  >
    <i class="fas fa-bars"></i> <!-- Icono del botón hamburguesa -->
  </button>

  <!-- SIDEBAR -->
  <nav
    class="sidebar d-flex flex-column flex-shrink-0"
    [class.open]="sidebarOpen"
  >

    <div class="logo-container text-center py-3">
      <img src="/images/logo.png" class="img-fluid" style="max-width: 100px;">
      <p class="text-muted small hide-on-collapse mb-0">Dashboard</p>
    </div>

    <div class="nav flex-column">

      <a
        routerLink="/app/home"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-home me-3"></i>
        <span class="hide-on-collapse">Home</span>
      </a>

      <!-- LISTAS -->
      <div class="sidebar-group">

        <a
          class="sidebar-link d-flex align-items-center justify-content-between p-3 text-decoration-none"
          data-bs-toggle="collapse"
          href="#listasMenu"
          role="button"
        >
          <div class="d-flex align-items-center">
            <i class="fas fa-list me-3"></i>
            <span class="hide-on-collapse">Listas</span>
          </div>
          <i class="fas fa-chevron-down small transition"></i>
        </a>

        <div class="collapse ps-4 mt-1" id="listasMenu">
          <a
            routerLink="/app/plantas"
            routerLinkActive="active"
            class="sidebar-sublink d-flex align-items-center text-decoration-none py-2"
            (click)="sidebarOpen = false"
          >
            <i class="fas fa-leaf me-3"></i>
            <span class="hide-on-collapse">Plantas</span>
          </a>

          <a
            routerLink="/app/plagas"
            routerLinkActive="active"
            class="sidebar-sublink d-flex align-items-center text-decoration-none py-2"
            (click)="sidebarOpen = false"
          >
            <i class="fas fa-bug me-3"></i>
            <span class="hide-on-collapse">Plagas</span>
          </a>
        </div>
      </div>

      <a
        routerLink="/chat-ia"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-robot me-3"></i>
        <span class="hide-on-collapse">Chat IA</span>
      </a>

    </div>

    <a
      routerLink="/ajustes"
      class="profile-section mt-auto p-4 text-decoration-none"
      (click)="sidebarOpen = false"
    >
      <div class="d-flex align-items-center">
        <img
          src="/images/crazy_dave.jpg"
          style="height:60px"
          class="rounded-circle"
        >
        <div class="ms-3 profile-info">
          <h6 class="text-white mb-0">Crazy Dave</h6>
          <small class="text-success">Admin</small>
        </div>
      </div>
    </a>

  </nav>

  <!-- CONTENIDO -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
