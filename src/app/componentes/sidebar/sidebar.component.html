<link
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
  rel="stylesheet"
/>

<div class="layout">

  <!-- BOTÓN HAMBURGUESA (SOLO MÓVIL) -->
  <button
    class="btn btn-success d-md-none position-fixed"
    style="top: 15px; left: 15px; z-index: 1100;"
    (click)="sidebarOpen = !sidebarOpen"
  >
    <i class="fas fa-bars"></i>
  </button>

  <!-- SIDEBAR -->
  <nav
    class="sidebar d-flex flex-column flex-shrink-0"
    [class.open]="sidebarOpen"
  >

    <div class="logo-container text-center py-3">
      <img src="/images/logo.png" class="img-fluid" style="max-width: 100px;">
    </div>

    <div class="nav flex-column">

      <a
        routerLink="/app/home"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-home me-3"></i>
        <span class="hide-on-collapse">Home</span>
      </a>

      <!-- PLANTAS -->
      <a
        routerLink="/app/plantas"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-leaf me-3"></i>
        <span class="hide-on-collapse">Plantas</span>
      </a>

      <!-- AMENAZAS -->
      <a
        routerLink="/app/amenazas"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-bug me-3"></i>
        <span class="hide-on-collapse">Amenazas</span>
      </a>

      <!-- CHAT IA -->
      <a
        routerLink="/app/chat-ia"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
      >
        <i class="fas fa-robot me-3"></i>
        <span class="hide-on-collapse">Chat IA</span>
      </a>

      <!-- ADMIN -->
      <a
        routerLink="/app/admin"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"
        (click)="sidebarOpen = false"
        *ngIf="esAdmin$ | async">
        <i class="fas fa-shield-halved me-3"></i>
        <span class="hide-on-collapse">Panel Admin</span>
      </a>

    </div>

    <!-- PERFIL DINÁMICO -->
    <a
      routerLink="/app/ajustes"
      class="profile-section mt-auto p-4 text-decoration-none"
      (click)="sidebarOpen = false"
    >
      <div class="d-flex align-items-center">
        <!-- FOTO PERFIL -->
        <img
          [src]="usuario?.foto || '/images/default-avatar.png'"
          style="height:60px; width:60px; object-fit: cover;"
          class="rounded-circle"
          alt="Foto perfil"
        >
        
        <div class="ms-3 profile-info">
          <!-- NOMBRE USUARIO -->
          <h6 class="text-white mb-0">{{ usuario?.nombre || 'Usuario' }}</h6>
          
          <!-- ROL: Admin o Email -->
          <small class="text-success">
            {{ usuario?.email === 'admin@huerting.com' ? 'Admin' : usuario?.email }}
          </small>
        </div>
      </div>
    </a>

    <!-- CERRAR SESIÓN -->
    <button
      class="btn btn-outline-danger mx-3 mb-2 hide-on-collapse"
      (click)="cerrarSesion()"
    >
      <i class="fas fa-right-from-bracket me-2"></i>Cerrar sesión
    </button>

  </nav>

  <!-- CONTENIDO -->
  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

</div>
