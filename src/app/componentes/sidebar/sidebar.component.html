<link

/>

<div class="layout">

  <nav class="sidebar d-flex flex-column flex-shrink-0">

    <div class="logo-container text-center py-3">

  <p class="text-muted small hide-on-collapse mb-0">Dashboard</p>
</div>


    <div class="nav flex-column">

      <a

      </a>

<div class="sidebar-group">

  <!-- Link principal -->

    href="#listasMenu"

      <i class="fas fa-list me-3"></i>
      <span class="hide-on-collapse">Listas</span>
    </div>

    <i class="fas fa-chevron-down small transition"></i>
  </a>

  <!-- Submenú -->
  <div class="collapse ps-4 mt-1" id="listasMenu">

    <a
      routerLink="/app/plantas_lista"
      routerLinkActive="active"
      class="sidebar-sublink d-flex align-items-center text-decoration-none py-2"

      <i class="fas fa-leaf me-3"></i>

    </a>

    <a
      routerLink="/app/plagas_lista"
      routerLinkActive="active"

    >
      <i class="fas fa-bug me-3"></i>
      <span class="hide-on-collapse">Plagas</span>
    </a>

  </div>
</div>


      <a
        routerLink="/chat-ia"
        routerLinkActive="active"
        class="sidebar-link text-decoration-none p-3"

      </a>

    </div>

<a

>

    />

    <div class="ms-3 profile-info">
      <h6 class="text-white mb-0">Crazy Dave</h6>
      <small class="text-success">Admin</small>
    </div>
  </div>

</a>
