<div class="contenedor container-fluid">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-xl-8 col-lg-10 col-md-11">

      <div class="card shadow-lg rounded-4 border-0 overflow-hidden">
        <div class="row g-0">

          <!-- Imagen izquierda -->
          <div class="col-lg-5 d-flex align-items-center justify-content-center bg-success bg-opacity-10">
            <img
              src="/images/logo.png"
              class="img-fluid p-4"
              alt="Logo"
              style="max-height: 300px;"
            />
          </div>

          <!-- Formulario -->
          <div class="col-lg-7">
            <div class="card-body p-4 p-md-5 bg-light">

              <h2 class="text-center mb-3 text-success fw-bold">
                Crear cuenta
              </h2>

              <p class="text-center text-muted mb-4">
                Completa los campos para registrarte
              </p>

              <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    formControlName="email"
                    class="form-control rounded-pill border border-success shadow-sm"
                    placeholder="usuario@email.com"
                  />
                  <small class="text-danger"
                    *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                    Email inválido
                  </small>
                </div>

                <!-- Usuario -->
                <div class="mb-3">
                  <label class="form-label">Nombre de usuario</label>
                  <input
                    type="text"
                    formControlName="username"
                    class="form-control rounded-pill border border-success shadow-sm"
                    placeholder="username"
                  />
                  <small class="text-danger"
                    *ngIf="registerForm.get('username')?.errors?.['restrictedWord']">
                    Nombre no permitido
                  </small>
                </div>

                <!-- Contraseña -->
                <div class="mb-3">
                  <label class="form-label">Contraseña</label>
                  <input
                    type="password"
                    formControlName="password"
                    class="form-control rounded-pill border border-success shadow-sm"
                  />
                </div>

                <!-- Confirmar contraseña -->
                <div class="mb-3">
                  <label class="form-label">Repetir contraseña</label>
                  <input
                    type="password"
                    formControlName="confirmPassword"
                    class="form-control rounded-pill border border-success shadow-sm"
                  />
                  <small class="text-danger"
                    *ngIf="registerForm.get('confirmPassword')?.errors?.['mismatch']">
                    Las contraseñas no coinciden
                  </small>
                </div>

                <!-- Botón -->
                <button
                  type="submit"
                  class="btn btn-success w-100 rounded-pill shadow-sm py-2"
                  [disabled]="registerForm.invalid">
                  Crear cuenta
                </button>
                <pre>{{ registerForm.status }}</pre>
<pre>{{ registerForm.value | json }}</pre>

              </form>

            </div>
          </div>

        </div>
      </div>

      <p class="text-center text-light mt-3">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-success fw-bold">Inicia sesión</a>
      </p>

    </div>
  </div>
</div>
