<div class="container-fluid contenedor img-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">

        <img src="/images/logo.png" class="img-fluid" alt="Imagen responsiva">   

      <!-- Card principal -->
      <div class="card shadow-lg rounded-4 border-0">
        <div class="card-body p-5 bg-light">


          <h2 class="text-center mb-4 text-success fw-bold">Crear cuenta</h2>
          <p class="text-center text-muted mb-4">
            Completa los campos para registrarte en nuestra plataforma
          </p>

          <form>

            <!-- Email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control rounded-pill border border-success shadow-sm" placeholder="usuario@email.com">
              <div class="form-text text-muted">
                Nunca compartiremos tu email con terceros
              </div>
            </div>

            <!-- Usuario -->
            <div class="mb-3">
              <label class="form-label">Nombre de usuario</label>
              <input type="text" class="form-control rounded-pill border border-success shadow-sm" placeholder="username">
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control rounded-pill border border-success shadow-sm" placeholder="********">
            </div>

            <!-- Repetir contraseña -->
            <div class="mb-3">
              <label class="form-label">Repetir contraseña</label>
              <input type="password" class="form-control rounded-pill border border-success shadow-sm" placeholder="********">
            </div>

            <!-- Botón principal -->
            <button type="submit" class="btn btn-success w-100 rounded-pill shadow-sm py-2">
              Crear cuenta
            </button>

          </form>

        </div>
      </div>

      <!-- Pie con llamada a acción -->
      <p class="text-center text-muted mt-3">
        ¿Ya tienes cuenta? <a href="#" class="text-primary fw-bold">Inicia sesión</a>
      </p>

    </div>
  </div>
</div>
