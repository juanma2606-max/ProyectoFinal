<div class="contenedor container-fluid min-vh-100 d-flex flex-column justify-content-center py-4 py-md-5 px-2 px-md-4">

  <!-- Header -->
  <div class="text-center mb-4 mb-md-5">
    <h2 class="text-light fw-bold fs-4 fs-md-2">Mis Huertos</h2>
    <p class="text-light mb-0">
      Gestiona tus huertos y macetas de un vistazo
    </p>
  </div>

  <div class="row g-3 g-md-4 justify-content-center">

    <!-- HUERTOS -->
    <div
      class="col-12 col-sm-6 col-lg-4 col-xl-3"
      *ngFor="let item of [1,2,3,4,5]"
    >
      <div class="card huerto-card h-100 border-0 shadow">

        <div class="huerto-img">
          <img
            src="/images/huerto1.jpg"
            alt="Huerto"
            class="img-fluid w-100 h-100"
          />
        </div>

        <div class="huerto-title text-center">
          Huerto {{ item }}
        </div>

        <div class="d-flex justify-content-around align-items-center bg-light py-2 border-top">
          <button
            class="btn action-btn delete"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            <i class="fa-solid fa-trash"></i>
          </button>

          <button class="btn action-btn edit">
            <i class="fa-solid fa-pen"></i>
          </button>

          <a
            class="btn action-btn view"
            routerLink="/app/huerto"
            role="button"
          >
            <i class="fa-solid fa-book"></i>
          </a>
        </div>

      </div>
    </div>

    <!-- MACETAS -->
    <div
      class="col-12 col-sm-6 col-lg-4 col-xl-3"
      *ngFor="let item of [1,2,3]"
    >
      <div class="card huerto-card h-100 border-0 shadow">

        <div class="huerto-img">
          <img
            src="/images/maceta.webp"
            alt="Maceta"
            class="img-fluid w-100 h-100"
          />
        </div>

        <div class="huerto-title text-center">
          Maceta {{ item }}
        </div>

        <div class="d-flex justify-content-around align-items-center bg-light py-2 border-top">
          <button
            class="btn action-btn delete"
            data-bs-toggle="modal"
            data-bs-target="#exampleModal"
          >
            <i class="fa-solid fa-trash"></i>
          </button>

          <button class="btn action-btn edit">
            <i class="fa-solid fa-pen"></i>
          </button>

          <a
            class="btn action-btn view"
            routerLink="/app/maceta"
            role="button"
          >
            <i class="fa-solid fa-book"></i>
          </a>
        </div>

      </div>
    </div>

  </div>

</div>

<!-- MODAL ELIMINAR (RESTAURADO, SIN CAMBIOS) -->
<div
  class="modal fade"
  id="exampleModal"
  tabindex="-1"
  aria-labelledby="exampleModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-danger" id="exampleModalLabel">
          Eliminar
        </h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>

      <div class="modal-body">
        ¿Estás seguro de querer eliminar este elemento?
      </div>

      <div class="modal-footer">
        <button
          type="button"
          class="btn btn-secondary"
          data-bs-dismiss="modal"
        >
          Cancelar
        </button>
        <button type="button" class="btn btn-danger">
          Eliminar
        </button>
      </div>
    </div>
  </div>
</div>
