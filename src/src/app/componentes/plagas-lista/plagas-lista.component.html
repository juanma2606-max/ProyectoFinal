<div class="list-group">
  <button
    *ngFor="let plaga of plagas"
    type="button"
    class="list-group-item list-group-item-action d-flex align-items-center gap-3"
    (click)="seleccionar(plaga)"
  >
    <img
      [src]="plaga.imagen"
      style="width:40px;height:40px;object-fit:cover"
      class="rounded"
    />

    {{ plaga.nombre }}
  </button>
</div>
